<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | AI Fun Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }
        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            margin-bottom: 30px;
        }
        .back-home {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .back-home:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <p class="error-message">죄송합니다. 요청하신 페이지를 찾을 수 없습니다.</p>
            <p>입력하신 주소가 정확한지 확인해 주세요.</p>
            <br>
            <a href="/" class="back-home">메인 페이지로 돌아가기</a>
        </div>
    </div>
</body>
</html>
