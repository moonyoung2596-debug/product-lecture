<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Face Test</title>
    <meta name="google-adsense-account" content="ca-pub-3317336298290140">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3317336298290140"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="theme-controls">
            <button id="black-mode" class="theme-btn">Black Mode</button>
            <button id="light-mode" class="theme-btn">Light Mode</button>
        </div>

        <div class="animal-test-section">
            <h1>Animal Face Test</h1>
            <p>당신은 강아지상일까요, 고양이상일까요?</p>
            
            <div class="upload-container">
                <div id="upload-area" class="upload-area">
                    <span>📷 사진을 클릭하거나 여기로 드래그하세요</span>
                    <input type="file" id="image-upload" accept="image/*" hidden>
                </div>
                <div id="image-preview-container" style="display: none;">
                    <img id="image-preview" src="#" alt="미리보기">
                </div>
            </div>

            <div id="label-container"></div>
        </div>

        <hr class="section-divider">

        <div class="lotto-section">
            <h1>Lotto Number Generator</h1>
            <div class="numbers-container">
                <div class="number"></div>
                <div class="number"></div>
                <div class="number"></div>
                <div class="number"></div>
                <div class="number"></div>
                <div class="number"></div>
            </div>
            <button id="generate-btn" class="submit-btn">Generate Numbers</button>
        </div>

        <div class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/mvzdbvpk" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>

        <div class="comments-section">
            <hr>
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://product1-3.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
